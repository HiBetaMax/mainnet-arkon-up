<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0e3a8a">
<!-- Content Security Policy: restrict what can run/load in this app -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self' blob:;
  script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
  style-src 'self' 'unsafe-inline';
  font-src 'self';
  img-src 'self' blob: data:;
  connect-src 'self' https://arkade.computer wss://arkade.computer https://api.kraken.com https://api.coingecko.com https://mempool.space https://boltz.exchange https://api.ark.boltz.exchange https://api.boltz.exchange;
  frame-src 'none';
  object-src 'none';
  base-uri 'self';
">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ArkON">
<meta name="application-name" content="ArkON">
<meta name="description" content="ArkON — Your Bitcoin wallet on the Ark protocol.">
<title>ArkON</title>
<link rel="manifest" href="#" id="pwa-manifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- SDK loading overlay — outside React so main.js can safely remove it -->
  <div id="sdk-loading" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#050d1a">
    <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg" id="sdk-loading-icon" style="width:64px;height:64px;animation:bob 4s ease-in-out infinite">
      <rect width="88" height="88" rx="24" fill="rgba(255,255,255,0.12)"/>
      <rect x="16" y="28" width="56" height="34" rx="6" fill="white" fill-opacity="0.9"/>
      <rect x="26" y="18" width="10" height="12" rx="3" fill="white" fill-opacity="0.65"/>
      <rect x="52" y="18" width="10" height="12" rx="3" fill="white" fill-opacity="0.65"/>
      <circle cx="33" cy="44" r="5" fill="#0e3a8a"/>
      <circle cx="55" cy="44" r="5" fill="#0e3a8a"/>
      <rect x="40" y="52" width="8" height="5" rx="2" fill="#0e3a8a"/>
      <rect x="8" y="44" width="8" height="8" rx="2" fill="white" fill-opacity="0.5"/>
      <rect x="72" y="44" width="8" height="8" rx="2" fill="white" fill-opacity="0.5"/>
    </svg>
    <div id="sdk-loading-text" style="color:#fff;font-size:14px;font-weight:600;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Connecting to Ark&#x2026;</div>
    <div id="sdk-loading-bar" style="width:180px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden">
      <div id="sdk-loading-fill" style="width:0%;height:100%;background:#fff;border-radius:2px;transition:width 0.6s ease"></div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
