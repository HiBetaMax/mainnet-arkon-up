<link rel="manifest" href="#" id="pwa-manifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// Early wallet-existence check — runs before modules load
(function(){
  try {
    var v2 = localStorage.getItem('arkade_wallet_privkey_mainnet_v2_enc');
    var v1 = localStorage.getItem('arkade_wallet_privkey_mainnet_v1');
    window._hasExistingWallet = !!(v2) || !!(v1 && v1.length === 64 && /^[0-9a-fA-F]+$/.test(v1));
  } catch(e) {
    window._hasExistingWallet = false;
  }
})();
</script>
</head>

  <div id="root"></div>
